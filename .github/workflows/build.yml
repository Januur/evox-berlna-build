name: Build EvoX A16 - berlna

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: 'userdebug or user'
        required: true
        default: 'userdebug'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:

    - name: Free Disk Space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/share/swift
        sudo rm -rf /usr/local/.ghcup
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/local/lib/node_modules
        sudo docker image prune --all --force
        sudo apt-get clean
        df -h

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick \
          lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool \
          libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev \
          libxml2 libxml2-utils lzop m4 openssl pngcrush rsync \
          schedtool squashfs-tools xsltproc zip zlib1g-dev \
          python3 python3-pip openjdk-11-jdk

    - name: Setup Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH
        git config --global user.email "januur@build.com"
        git config --global user.name "Januur"
        git config --global color.ui false

    - name: Init EvoX A16 Manifest
      run: |
        mkdir ~/evox && cd ~/evox
        repo init \
          -u https://github.com/Evolution-X/manifest \
          -b bq2 \
          --depth=1

    - name: Setup Local Manifest
      run: |
        mkdir -p ~/evox/.repo/local_manifests
        cat > ~/evox/.repo/local_manifests/berlna.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>

          <!-- Device Tree -->
          <project name="Januur/android_device_motorola_berlna"
                   path="device/motorola/berlna"
                   remote="github"
                   revision="lineage-23.2" />

          <!-- Common Tree -->
          <project name="Januur/android_device_motorola_sm7325-common"
                   path="device/motorola/sm7325-common"
                   remote="github"
                   revision="lineage-23.2" />

          <!-- Kernel — using LineageOS directly (has lineage-23.2) -->
          <project name="LineageOS/android_kernel_motorola_sm7325"
                   path="kernel/motorola/sm7325"
                   remote="github"
                   revision="lineage-23.2" />

          <!-- Vendor Blobs -->
          <project name="Januur/proprietary_vendor_motorola_berlna"
                   path="vendor/motorola/berlna"
                   remote="github"
                   revision="lineage-23.2" />

        </manifest>
        EOF

    - name: Sync Source
      run: |
        cd ~/evox
        repo sync -c -j4 --force-sync --no-clone-bundle --no-tags || \
        repo sync -c -j2 --force-sync --no-clone-bundle --no-tags || \
        repo sync -c -j1 --force-sync --no-clone-bundle --no-tags

    - name: Cache CCache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: evox-berlna-${{ github.run_id }}
        restore-keys: evox-berlna-

    - name: Build ROM
      run: |
        cd ~/evox
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        ccache -M 10G
        source build/envsetup.sh
        lunch evolution_berlna-${{ github.event.inputs.BUILD_TYPE }}
        mka bacon 2>&1 | tee ~/build.log

    - name: Upload ROM
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: EvoX-A16-berlna-${{ github.run_id }}
        path: |
          ~/evox/out/target/product/berlna/*.zip
          ~/evox/out/target/product/berlna/boot.img
          ~/evox/out/target/product/berlna/vendor_boot.img
          ~/evox/out/target/product/berlna/vbmeta*.img
        retention-days: 7

    - name: Upload Log if Failed
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-log-${{ github.run_id }}
        path: ~/build.log
        retention-days: 3
